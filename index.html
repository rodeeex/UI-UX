<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Заметки с тегами</title>
        <style>
            :root {
                --color-primary: #c2410c;
                --color-primary-hover: #9a3412;
                --color-bg: #ffffff;
                --color-surface: #fff7ed;
                --color-text: #1c1917;
                --color-text-muted: #57534e;
                --color-border: #e7e5e4;
                --color-tag-bg: #ffedd5;
                --color-tag-text: #9a3412;
                --color-danger: #b91c1c;
                --color-danger-hover: #7f1d1d;
                --focus-color: #1c1917;
            }

            * {
                box-sizing: border-box;
            }

            html {
                font-size: 100%;
            }

            body {
                margin: 0;
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    Arial,
                    sans-serif;
                font-size: 1rem;
                line-height: 1.6;
                color: var(--color-text);
                background: var(--color-bg);
            }

            .visually-hidden {
                position: absolute;
                width: 1px;
                height: 1px;
                overflow: hidden;
                clip: rect(0 0 0 0);
                white-space: nowrap;
            }

            .skip-link {
                position: absolute;
                left: -9999px;
                top: 0;
                background: var(--color-primary);
                color: #fff;
                padding: 0.5rem 1rem;
                z-index: 100;
                border-radius: 0 0 4px 0;
            }
            .skip-link:focus {
                left: 0;
            }

            header {
                background: var(--color-primary);
                color: #fff;
                padding: 1.25rem 1rem;
            }

            header h1 {
                margin: 0;
                font-size: 1.5rem;
            }

            main {
                max-width: 720px;
                margin: 0 auto;
                padding: 1.25rem 1rem 3rem;
            }

            .toolbar {
                display: flex;
                flex-wrap: wrap;
                gap: 0.75rem;
                align-items: flex-end;
                margin-bottom: 0.5rem;
            }

            .search-field {
                flex: 1 1 220px;
                display: flex;
                flex-direction: column;
                gap: 0.25rem;
            }

            label {
                font-weight: 600;
            }

            input[type="search"],
            input[type="text"],
            textarea {
                font: inherit;
                color: var(--color-text);
                background: #fff;
                border: 2px solid var(--color-border);
                border-radius: 4px;
                padding: 0.5rem 0.625rem;
                min-height: 44px;
            }

            textarea {
                min-height: 120px;
                resize: vertical;
            }

            input:focus-visible,
            textarea:focus-visible,
            button:focus-visible,
            a:focus-visible {
                outline: 3px solid var(--focus-color);
                outline-offset: 2px;
            }

            .status-line {
                color: var(--color-text-muted);
                margin: 0.25rem 0 1rem;
                font-size: 0.95rem;
            }

            .btn {
                font: inherit;
                font-weight: 600;
                border-radius: 4px;
                border: 2px solid transparent;
                padding: 0.625rem 1.125rem;
                min-height: 44px;
                cursor: pointer;
            }

            .btn-primary {
                background: var(--color-primary);
                color: #fff;
            }
            .btn-primary:hover {
                background: var(--color-primary-hover);
            }

            .btn-secondary {
                background: #fff;
                border-color: var(--color-primary);
                color: var(--color-primary-hover);
            }
            .btn-secondary:hover {
                background: var(--color-surface);
            }

            .btn-danger {
                background: #fff;
                border-color: var(--color-danger);
                color: var(--color-danger);
            }
            .btn-danger:hover {
                background: #fef2f2;
            }

            .btn-danger-solid {
                background: var(--color-danger);
                color: #fff;
            }
            .btn-danger-solid:hover {
                background: var(--color-danger-hover);
            }

            ul#notes-list {
                list-style: none;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }

            .note-card {
                border: 1px solid var(--color-border);
                border-left: 6px solid var(--color-primary);
                background: var(--color-surface);
                border-radius: 6px;
                padding: 1rem;
            }

            .note-card h3 {
                margin: 0 0 0.4rem;
                font-size: 1.15rem;
            }

            .tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.4rem;
                margin-bottom: 0.5rem;
            }

            .tag {
                background: var(--color-tag-bg);
                color: var(--color-tag-text);
                border-radius: 999px;
                padding: 0.15rem 0.65rem;
                font-size: 0.85rem;
                font-weight: 600;
            }

            .note-body {
                margin: 0.4rem 0;
                color: var(--color-text);
                white-space: pre-wrap;
            }

            .note-meta {
                margin: 0.4rem 0 0.6rem;
                font-size: 0.85rem;
                color: var(--color-text-muted);
            }

            .note-actions {
                display: flex;
                gap: 0.5rem;
                flex-wrap: wrap;
            }

            #empty-message {
                color: var(--color-text-muted);
                border: 1px dashed var(--color-border);
                border-radius: 6px;
                padding: 1.5rem;
                text-align: center;
            }

            dialog {
                border: none;
                border-radius: 6px;
                padding: 1.25rem;
                max-width: 480px;
                width: 90%;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            }

            dialog::backdrop {
                background: rgba(28, 25, 23, 0.5);
            }

            dialog h2 {
                margin-top: 0;
            }

            .field {
                display: flex;
                flex-direction: column;
                gap: 0.25rem;
                margin-bottom: 0.9rem;
            }

            .field-hint {
                font-size: 0.85rem;
                color: var(--color-text-muted);
            }

            .field-error {
                color: var(--color-danger);
                font-size: 0.9rem;
                min-height: 1.2em;
            }

            .dialog-actions {
                display: flex;
                justify-content: flex-end;
                gap: 0.5rem;
                margin-top: 0.5rem;
            }

            [aria-invalid="true"] {
                border-color: var(--color-danger);
            }
        </style>
    </head>
    <body>
        <a href="#main" class="skip-link">Перейти к содержимому</a>

        <header>
            <h1>Заметки с тегами</h1>
        </header>

        <main id="main">
            <div class="toolbar">
                <div class="search-field">
                    <label for="search">Поиск по тексту или тегам</label>
                    <input
                        type="search"
                        id="search"
                        name="search"
                        placeholder="Например: работа"
                    />
                </div>
                <button type="button" id="add-btn" class="btn btn-primary">
                    Добавить заметку
                </button>
            </div>

            <p id="results-status" class="status-line" aria-live="polite"></p>

            <ul id="notes-list" aria-label="Список заметок"></ul>
            <p id="empty-message" hidden></p>
        </main>

        <dialog id="note-dialog" aria-labelledby="dialog-title">
            <form id="note-form" novalidate>
                <h2 id="dialog-title">Новая заметка</h2>

                <div class="field">
                    <label for="note-title">Заголовок</label>
                    <input
                        type="text"
                        id="note-title"
                        name="note-title"
                        aria-describedby="title-error"
                        required
                    />
                    <p id="title-error" class="field-error" role="alert"></p>
                </div>

                <div class="field">
                    <label for="note-tags">Теги</label>
                    <span id="tags-hint" class="field-hint"
                        >Через запятую, например: работа, идеи</span
                    >
                    <input
                        type="text"
                        id="note-tags"
                        name="note-tags"
                        aria-describedby="tags-hint"
                    />
                </div>

                <div class="field">
                    <label for="note-body">Текст заметки</label>
                    <textarea id="note-body" name="note-body"></textarea>
                </div>

                <div class="dialog-actions">
                    <button
                        type="button"
                        id="cancel-btn"
                        class="btn btn-secondary"
                    >
                        Отмена
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Сохранить
                    </button>
                </div>
            </form>
        </dialog>

        <dialog
            id="confirm-dialog"
            aria-labelledby="confirm-title"
            aria-describedby="confirm-text"
        >
            <h2 id="confirm-title">Удалить заметку?</h2>
            <p id="confirm-text">Это действие нельзя отменить.</p>
            <div class="dialog-actions">
                <button
                    type="button"
                    id="confirm-cancel-btn"
                    class="btn btn-secondary"
                >
                    Отмена
                </button>
                <button
                    type="button"
                    id="confirm-delete-btn"
                    class="btn btn-danger-solid"
                >
                    Удалить
                </button>
            </div>
        </dialog>

        <script>
            const STORAGE_KEY = "notes-app-data-v1";

            let notes = loadNotes();
            let editingId = null;
            let noteToDelete = null;
            let lastFocused = null;

            const searchInput = document.getElementById("search");
            const addBtn = document.getElementById("add-btn");
            const notesList = document.getElementById("notes-list");
            const emptyMessage = document.getElementById("empty-message");
            const resultsStatus = document.getElementById("results-status");

            const noteDialog = document.getElementById("note-dialog");
            const noteForm = document.getElementById("note-form");
            const dialogTitle = document.getElementById("dialog-title");
            const titleInput = document.getElementById("note-title");
            const titleError = document.getElementById("title-error");
            const tagsInput = document.getElementById("note-tags");
            const bodyInput = document.getElementById("note-body");
            const cancelBtn = document.getElementById("cancel-btn");

            const confirmDialog = document.getElementById("confirm-dialog");
            const confirmText = document.getElementById("confirm-text");
            const confirmDeleteBtn =
                document.getElementById("confirm-delete-btn");
            const confirmCancelBtn =
                document.getElementById("confirm-cancel-btn");

            function loadNotes() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    return raw ? JSON.parse(raw) : [];
                } catch (e) {
                    return [];
                }
            }

            function saveNotes() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
            }

            function generateId() {
                if (window.crypto && crypto.randomUUID)
                    return crypto.randomUUID();
                return (
                    "id-" +
                    Date.now() +
                    "-" +
                    Math.random().toString(16).slice(2)
                );
            }

            function formatDate(iso) {
                const d = new Date(iso);
                return d.toLocaleString("ru-RU", {
                    day: "2-digit",
                    month: "2-digit",
                    year: "numeric",
                    hour: "2-digit",
                    minute: "2-digit",
                });
            }

            function getFilteredNotes() {
                const sorted = [...notes].sort(
                    (a, b) => new Date(b.updatedAt) - new Date(a.updatedAt),
                );
                const query = searchInput.value.trim().toLowerCase();
                if (!query) return sorted;
                return sorted.filter((note) => {
                    const inTitle = note.title.toLowerCase().includes(query);
                    const inBody = note.body.toLowerCase().includes(query);
                    const inTags = note.tags.some((tag) =>
                        tag.toLowerCase().includes(query),
                    );
                    return inTitle || inBody || inTags;
                });
            }

            function render() {
                const filtered = getFilteredNotes();
                notesList.innerHTML = "";

                if (filtered.length === 0) {
                    emptyMessage.hidden = false;
                    emptyMessage.textContent =
                        notes.length === 0
                            ? "Заметок пока нет. Нажмите «Добавить заметку», чтобы создать первую."
                            : "По вашему запросу ничего не найдено.";
                } else {
                    emptyMessage.hidden = true;
                    filtered.forEach((note) =>
                        notesList.appendChild(buildNoteCard(note)),
                    );
                }

                const query = searchInput.value.trim();
                resultsStatus.textContent = query
                    ? `Найдено заметок: ${filtered.length}`
                    : `Всего заметок: ${filtered.length}`;
            }

            function buildNoteCard(note) {
                const li = document.createElement("li");
                li.className = "note-card";

                const heading = document.createElement("h3");
                heading.textContent = note.title;
                li.appendChild(heading);

                if (note.tags.length) {
                    const tagsWrap = document.createElement("div");
                    tagsWrap.className = "tags";
                    tagsWrap.setAttribute(
                        "aria-label",
                        "Теги: " + note.tags.join(", "),
                    );
                    note.tags.forEach((tag) => {
                        const span = document.createElement("span");
                        span.className = "tag";
                        span.textContent = tag;
                        span.setAttribute("aria-hidden", "true");
                        tagsWrap.appendChild(span);
                    });
                    li.appendChild(tagsWrap);
                }

                if (note.body) {
                    const p = document.createElement("p");
                    p.className = "note-body";
                    p.textContent =
                        note.body.length > 220
                            ? note.body.slice(0, 220) + "…"
                            : note.body;
                    li.appendChild(p);
                }

                const meta = document.createElement("p");
                meta.className = "note-meta";
                meta.textContent = "Изменено: " + formatDate(note.updatedAt);
                li.appendChild(meta);

                const actions = document.createElement("div");
                actions.className = "note-actions";

                const editBtn = document.createElement("button");
                editBtn.type = "button";
                editBtn.className = "btn btn-secondary";
                editBtn.textContent = "Редактировать";
                editBtn.setAttribute(
                    "aria-label",
                    "Редактировать заметку «" + note.title + "»",
                );
                editBtn.addEventListener("click", () =>
                    openEditDialog(note, editBtn),
                );

                const deleteBtn = document.createElement("button");
                deleteBtn.type = "button";
                deleteBtn.className = "btn btn-danger";
                deleteBtn.textContent = "Удалить";
                deleteBtn.setAttribute(
                    "aria-label",
                    "Удалить заметку «" + note.title + "»",
                );
                deleteBtn.addEventListener("click", () =>
                    openConfirmDialog(note),
                );

                actions.append(editBtn, deleteBtn);
                li.appendChild(actions);

                return li;
            }

            function openAddDialog() {
                editingId = null;
                lastFocused = addBtn;
                dialogTitle.textContent = "Новая заметка";
                noteForm.reset();
                clearTitleError();
                noteDialog.showModal();
                titleInput.focus();
            }

            function openEditDialog(note, trigger) {
                editingId = note.id;
                lastFocused = trigger;
                dialogTitle.textContent = "Редактировать заметку";
                titleInput.value = note.title;
                tagsInput.value = note.tags.join(", ");
                bodyInput.value = note.body;
                clearTitleError();
                noteDialog.showModal();
                titleInput.focus();
            }

            function clearTitleError() {
                titleError.textContent = "";
                titleInput.removeAttribute("aria-invalid");
            }

            function closeNoteDialog() {
                noteDialog.close();
                if (lastFocused) lastFocused.focus();
            }

            noteForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const title = titleInput.value.trim();

                if (!title) {
                    titleError.textContent =
                        "Заголовок обязателен для заполнения.";
                    titleInput.setAttribute("aria-invalid", "true");
                    titleInput.focus();
                    return;
                }

                const tags = tagsInput.value
                    .split(",")
                    .map((t) => t.trim())
                    .filter(Boolean);
                const body = bodyInput.value.trim();
                const now = new Date().toISOString();

                if (editingId) {
                    const note = notes.find((n) => n.id === editingId);
                    note.title = title;
                    note.tags = tags;
                    note.body = body;
                    note.updatedAt = now;
                } else {
                    notes.push({
                        id: generateId(),
                        title,
                        tags,
                        body,
                        createdAt: now,
                        updatedAt: now,
                    });
                }

                saveNotes();
                closeNoteDialog();
                render();
            });

            cancelBtn.addEventListener("click", closeNoteDialog);

            noteDialog.addEventListener("cancel", (e) => {
                e.preventDefault();
                closeNoteDialog();
            });

            function openConfirmDialog(note) {
                noteToDelete = note;
                confirmText.textContent =
                    "Заметка «" +
                    note.title +
                    "» будет удалена без возможности восстановления.";
                confirmDialog.showModal();
                confirmCancelBtn.focus();
            }

            function closeConfirmDialog() {
                confirmDialog.close();
                noteToDelete = null;
                addBtn.focus();
            }

            confirmDeleteBtn.addEventListener("click", () => {
                if (noteToDelete) {
                    notes = notes.filter((n) => n.id !== noteToDelete.id);
                    saveNotes();
                    render();
                }
                closeConfirmDialog();
            });

            confirmCancelBtn.addEventListener("click", closeConfirmDialog);

            confirmDialog.addEventListener("cancel", (e) => {
                e.preventDefault();
                closeConfirmDialog();
            });

            addBtn.addEventListener("click", openAddDialog);
            searchInput.addEventListener("input", render);

            render();
        </script>
    </body>
</html>
